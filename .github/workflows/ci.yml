name: CI

# Corre em PRs e em pushes para main. Mantém o feedback rápido (lint + build),
# o deploy fica na workflow separada (deploy.yml).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json
      - run: npm ci
        working-directory: apps/${{ matrix.app }}
      - run: npm run lint
        working-directory: apps/${{ matrix.app }}

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
