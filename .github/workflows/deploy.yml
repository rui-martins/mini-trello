name: Deploy

# Constrói as imagens UMA vez (GHCR), faz deploy automático em DEV, e promove
# para PROD só após o teu "Approve" (regra Required reviewers do Environment
# "production"). A mesma imagem testada em DEV é a que vai para PROD.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mini-trello-api:latest
            ghcr.io/${{ github.repository_owner }}/mini-trello-api:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mini-trello-web:latest
            ghcr.io/${{ github.repository_owner }}/mini-trello-web:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to DEV
    needs: build-push
    runs-on: ubuntu-latest
    environment: development # sem regras: deploy automático
    env:
      DEPLOY_DIR: /opt/mini-trello-dev
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Sync compose file
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            docker-compose.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/docker-compose.yml

      - name: Pull & restart
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ env.DEPLOY_DIR }} \
             && IMAGE_TAG=${{ needs.build-push.outputs.tag }} docker compose pull \
             && IMAGE_TAG=${{ needs.build-push.outputs.tag }} docker compose up -d \
             && docker image prune -f"

  deploy-prod:
    name: Deploy to PROD
    needs: [build-push, deploy-dev]
    runs-on: ubuntu-latest
    environment: production # Required reviewers: fica em pausa até carregares Approve
    env:
      DEPLOY_DIR: /opt/mini-trello-prod
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Sync compose file
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            docker-compose.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/docker-compose.yml

      - name: Pull & restart
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ env.DEPLOY_DIR }} \
             && IMAGE_TAG=${{ needs.build-push.outputs.tag }} docker compose pull \
             && IMAGE_TAG=${{ needs.build-push.outputs.tag }} docker compose up -d \
             && docker image prune -f"
