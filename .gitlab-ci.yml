# Pipeline base do Mini-Trello.
# O mentor (Rui) refina os detalhes de deploy quando o servidor interno estiver pronto.
# Para os estagiários: basta que esta pipeline fique verde antes do merge.

stages:
  - lint
  - build
  - deploy

default:
  image: node:24-bookworm-slim

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

.cache_api: &cache_api
  cache:
    key: api-$CI_COMMIT_REF_SLUG
    paths:
      - apps/api/node_modules

.cache_web: &cache_web
  cache:
    key: web-$CI_COMMIT_REF_SLUG
    paths:
      - apps/web/node_modules

lint:api:
  <<: *cache_api
  stage: lint
  script:
    - cd apps/api
    - npm ci
    - npm run lint

lint:web:
  <<: *cache_web
  stage: lint
  script:
    - cd apps/web
    - npm ci
    - npm run lint

build:web:
  <<: *cache_web
  stage: build
  script:
    - cd apps/web
    - npm ci
    - npm run build
  artifacts:
    paths:
      - apps/web/dist
    expire_in: 1 day

deploy:dev:
  stage: deploy
  only:
    - main
