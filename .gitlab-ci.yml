# =============================================================================
# Pipeline do Mini-Trello — DESATIVADA temporariamente.
#
# Motivo: o GitLab interno ainda nao tem runners disponiveis, pelo que os jobs
# ficavam "stuck" (sem runner que os execute). Enquanto nao houver runner
# (um instance runner da equipa de infra, ou um runner registado no projeto),
# mantemos tudo desligado para nao deixar pipelines pendentes/em pausa.
#
# O bloco `workflow: rules: when: never` impede a criacao de QUALQUER pipeline,
# por isso nada e' agendado e nada fica preso no GitLab.
#
# COMO REATIVAR (quando houver runner):
#   1. Remover o bloco `workflow:` e o job `noop` abaixo.
#   2. Descomentar `stages:`, `default:`, `variables:`, as caches e os jobs.
#   3. Se os runners da empresa exigirem tags, adicionar `tags:` a cada job.
# =============================================================================

workflow:
  rules:
    - when: never

# Placeholder so para o ficheiro continuar valido enquanto a pipeline esta
# desativada. Nunca corre — o `workflow` acima bloqueia toda a criacao de pipelines.
noop:
  stage: build
  script:
    - 'echo "Pipeline desativada — ver cabecalho do .gitlab-ci.yml"'

