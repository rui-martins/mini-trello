server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip básico para os assets do build.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: qualquer rota desconhecida cai no index.html (React Router trata).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy da API. O frontend chama sempre /api/... e aqui retiramos o
    # prefixo /api (a barra final no proxy_pass faz o strip), tal como o
    # proxy do Vite faz em desenvolvimento.
    #   /api/auth/login  ->  http://api:3000/auth/login
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
